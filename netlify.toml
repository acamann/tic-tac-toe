[build]
  command="CI= npm run build"
  publish="build"
  functions="functions"

[[edge_functions]]
  function = "pair"
  path = "/pair"

[[redirects]]
  from="/api/*"
  to="/.netlify/functions/:splat"
  status=200
  force=true

[[headers]]
  for = "/*"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"